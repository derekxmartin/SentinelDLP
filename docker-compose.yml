services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: akeso
      POSTGRES_PASSWORD: akeso
      POSTGRES_DB: akeso_dlp
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U akeso -d akeso_dlp"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - dlp-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - dlp-network

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "8000:8000"
      - "50051:50051"
    environment:
      DLP_DATABASE_URL: postgresql+asyncpg://akeso:akeso@postgres:5432/akeso_dlp
      DLP_REDIS_URL: redis://redis:6379/0
      DLP_DEBUG: "true"
      DLP_SIEM_ENABLED: "true"
      DLP_SIEM_ENDPOINT: "http://host.docker.internal:8080/api/v1/ingest"
      DLP_SIEM_API_KEY: "nYDuNNAEkakSYAJCWZTZ269VXfJcbySygcMswGRQCmY"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - ./server:/app/server
      - ./requirements.txt:/app/requirements.txt
    networks:
      - dlp-network

  console:
    build:
      context: ./console
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://0.0.0.0:3000"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    volumes:
      - ./console/src:/app/src
      - ./console/public:/app/public
    depends_on:
      server:
        condition: service_healthy
    networks:
      - dlp-network

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"
      - "8025:8025"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8025"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - dlp-network

  # --- Network Monitor Services ---

  http-proxy:
    build:
      context: .
      dockerfile: network/Dockerfile.http
    ports:
      - "8080:8080"
      - "8081:8081"  # mitmproxy web interface
    environment:
      DLP_SERVER_URL: http://server:8000
      DLP_MODE: monitor  # monitor | prevent
      DLP_BLOCK_THRESHOLD: "1"
      DLP_DOMAIN_ALLOWLIST: ""
    depends_on:
      server:
        condition: service_healthy
    volumes:
      - ./network:/app/network
      - ./server:/app/server
      - proxy-certs:/root/.mitmproxy
    networks:
      - dlp-network

  smtp-relay:
    build:
      context: .
      dockerfile: network/Dockerfile.smtp
    ports:
      - "2525:2525"
    environment:
      DLP_SERVER_URL: http://server:8000
      DLP_MODE: monitor  # monitor | prevent
      DLP_UPSTREAM_HOST: mailhog
      DLP_UPSTREAM_PORT: "1025"
      DLP_BLOCK_THRESHOLD: "5"
      DLP_MODIFY_THRESHOLD: "1"
      DLP_QUARANTINE_ADDRESS: quarantine@dlp.local
    depends_on:
      server:
        condition: service_healthy
      mailhog:
        condition: service_healthy
    volumes:
      - ./network:/app/network
      - ./server:/app/server
    networks:
      - dlp-network

volumes:
  pgdata:
  proxy-certs:

networks:
  dlp-network:
    driver: bridge
