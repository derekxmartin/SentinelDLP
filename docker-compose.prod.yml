## AkesoDLP Production Docker Compose (P11-T7)
##
## Usage:
##   make deploy
##   # or manually:
##   docker compose -f docker-compose.prod.yml up -d

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DLP_DB_USER:-akeso}
      POSTGRES_PASSWORD: ${DLP_DB_PASS:-CHANGE_ME_IN_PRODUCTION}
      POSTGRES_DB: ${DLP_DB_NAME:-akeso_dlp}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DLP_DB_USER:-akeso} -d ${DLP_DB_NAME:-akeso_dlp}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dlp-network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dlp-network

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    restart: unless-stopped
    ports:
      - "${DLP_API_PORT:-8000}:8000"
      - "${DLP_GRPC_PORT:-50051}:50051"
    environment:
      DLP_DATABASE_URL: "postgresql+asyncpg://${DLP_DB_USER:-akeso}:${DLP_DB_PASS:-CHANGE_ME_IN_PRODUCTION}@postgres:5432/${DLP_DB_NAME:-akeso_dlp}"
      DLP_REDIS_URL: redis://redis:6379/0
      DLP_DEBUG: "false"
      DLP_JWT_SECRET: ${DLP_JWT_SECRET:?DLP_JWT_SECRET must be set}
      DLP_CORS_ORIGINS: ${DLP_CORS_ORIGINS:-["http://localhost:3000"]}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - dlp-network

  console:
    build:
      context: ./console
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${DLP_CONSOLE_PORT:-3000}:3000"
    depends_on:
      server:
        condition: service_healthy
    stop_grace_period: 10s
    networks:
      - dlp-network

volumes:
  pgdata:

networks:
  dlp-network:
    driver: bridge
